<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Field :: Virgil</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
    body {
      background-color: #000022; color: #ccbbff;
      font-family: "Times New Roman", serif; margin: 0; padding: 0;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 20% 35%, white, transparent),
        radial-gradient(1px 1px at 50% 70%, white, transparent),
        radial-gradient(1px 1px at 80% 20%, white, transparent),
        radial-gradient(1px 1px at 10% 85%, white, transparent),
        radial-gradient(1px 1px at 65% 45%, white, transparent);
      pointer-events: none; z-index: 0;
    }
    .wrapper {
      position: relative; z-index: 1;
      max-width: 660px; margin: 0 auto;
      padding: 60px 20px 80px; text-align: center;
    }
    .torch {
      display: inline-block; font-size: 1.8em;
      animation: flicker 0.15s infinite alternate;
      filter: drop-shadow(0 0 10px #ff8800) drop-shadow(0 0 20px #ff4400);
      margin: 0 8px;
    }
    @keyframes flicker {
      0%   { transform: scaleY(1) scaleX(1); opacity: 1; }
      100% { transform: scaleY(0.96) scaleX(1.03); opacity: 0.9; }
    }
    h1 {
      font-family: "UnifrakturMaguntia", serif; font-size: 2.6em;
      color: #ddaaff; text-shadow: 0 0 10px #aa44ff, 0 0 28px #550099;
      margin: 20px 0 8px;
    }
    .subtitle { font-style: italic; color: #7755aa; font-size: 0.9em; margin-bottom: 40px; }
    .coming-soon {
      background: rgba(20, 0, 50, 0.7); border: 2px solid #6633aa;
      box-shadow: 0 0 18px rgba(150, 50, 255, 0.4);
      padding: 30px; font-style: italic; color: #9977cc; line-height: 2;
    }
    .back-link { color: #9966cc; text-decoration: none; font-size: 0.85em; letter-spacing: 0.1em; }
    .back-link:hover { color: #ddaaff; }
    a { color: #cc88ff; }
  </style>
</head>
<body>
<div class="wrapper">
  <div><a class="back-link" href="../index.html">&#x2190; return to the entrance</a></div>
  <div style="margin-top:20px;">
    <span class="torch">🔥</span><span class="torch">🔥</span><span class="torch">🔥</span>
  </div>
  <h1>The Field</h1>
  <div class="subtitle">where the asphodel grows</div>
  <div class="coming-soon">
    <p>The asphodel is still growing here.</p>
    <p>Everything in the field moves at the pace of the field.<br>
    It will be ready when the roots say it is ready.</p>
    <p>&#x2726; &nbsp; &#x2665; &nbsp; &#x2726;</p>
  </div>
</div>
</body>
</html>
